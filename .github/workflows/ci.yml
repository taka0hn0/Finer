name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Build and test
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build and run regression tests
        run: make check

      - name: Test isolated install and uninstall
        run: make test-install

      - name: Build and verify reproducible source distribution
        run: make test-dist
